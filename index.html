<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloch Sphere</title>
<link rel="stylesheet" href="bloch.css">
</head>
<body>

<div class="header">
  <h1>Bloch <span>Sphere</span></h1>
  <p>Single-qubit state space — every point on the surface is a pure quantum state</p>
</div>

<div class="layout">

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="440"></canvas>
  </div>

  <!-- Panel -->
  <div class="panel">

    <div class="tabs">
      <button class="tab active" onclick="setMode('manual')">Manual</button>
      <button class="tab" onclick="setMode('states')">States</button>
      <button class="tab" onclick="setMode('gates')">Gates</button>
    </div>

    <!-- Manual -->
    <div id="pm" class="section">
      <div class="ctrl">
        <label>θ</label>
        <input type="range" id="th" min="0" max="180" value="54" oninput="upd()">
        <span id="tv">54°</span>
      </div>
      <div class="ctrl">
        <label>φ</label>
        <input type="range" id="ph" min="0" max="360" value="45" oninput="upd()">
        <span id="pv">45°</span>
      </div>
    </div>

    <!-- States -->
    <div id="ps" class="section" style="display:none">
      <div class="g2">
        <button onclick="ss(0,0)"><span class="ket">|0⟩</span> north</button>
        <button onclick="ss(180,0)"><span class="ket">|1⟩</span> south</button>
        <button onclick="ss(90,0)"><span class="ket">|+⟩</span> +X</button>
        <button onclick="ss(90,180)"><span class="ket">|−⟩</span> −X</button>
        <button onclick="ss(90,90)"><span class="ket">|i⟩</span> +Y</button>
        <button onclick="ss(90,270)"><span class="ket">|−i⟩</span> −Y</button>
      </div>
    </div>

    <!-- Gates -->
    <div id="pg" class="section" style="display:none">
      <div class="g2">
        <button class="gate-btn" onclick="gate('H')">H — Hadamard</button>
        <button class="gate-btn" onclick="gate('X')">X — NOT</button>
        <button class="gate-btn" onclick="gate('Y')">Y gate</button>
        <button class="gate-btn" onclick="gate('Z')">Z — phase flip</button>
        <button class="gate-btn" onclick="gate('S')">S — √Z</button>
        <button class="gate-btn" onclick="gate('T')">T — π/8</button>
      </div>
    </div>

    <!-- State vector -->
    <div class="info-card">
      <div class="info-label">State vector</div>
      <div id="sv"></div>
    </div>

    <!-- Probabilities -->
    <div class="info-card">
      <div class="info-label">Measurement probabilities</div>
      <div class="prob-row">
        <div class="prob-col">
          <div class="plbl">P(|0⟩)</div>
          <div class="ptrack"><div id="p0b" class="pbar"></div></div>
          <div id="p0t" class="pval"></div>
        </div>
        <div class="prob-col">
          <div class="plbl">P(|1⟩)</div>
          <div class="ptrack"><div id="p1b" class="pbar"></div></div>
          <div id="p1t" class="pval"></div>
        </div>
      </div>
    </div>

    <!-- Bloch coords -->
    <div class="info-card">
      <div class="info-label">Bloch vector</div>
      <div id="bv"></div>
    </div>

  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#7b6ef6"></div>|0⟩ |1⟩ — Z axis</div>
  <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>|+⟩ |−⟩ — X axis</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0a843"></div>|i⟩ — +Y axis</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e667a0"></div>|−i⟩ — −Y axis</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7b6ef6;opacity:0.5"></div>state vector</div>
  <div class="legend-item" style="color:#8b90b8">θ = polar · φ = azimuthal</div>
</div>

<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 400, H = 440, cx = 200, cy = 230, R = 158;
let tD = 54, pD = 45;

const purple = '#7b6ef6', purpleDim = '#4a44a0';
const teal   = '#2dd4b0';
const amber  = '#f0a843';
const pink   = '#e667a0';
const blue   = '#60a5fa';
const fg     = '#e8eaf6';
const fgd    = '#4a5080';
const fgdd   = '#232840';
const gridLine = '#1e2440';

function proj(x, y, z) {
  const ysx = -0.52, ysy = 0.30;
  const sx = x + y * ysx;
  const sy = -z + y * ysy;
  return { x: cx + sx * R, y: cy + sy * R };
}

function ah(x1, y1, x2, y2, col) {
  const a = Math.atan2(y2 - y1, x2 - x1), l = 8;
  ctx.beginPath(); ctx.fillStyle = col;
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - l * Math.cos(a - 0.38), y2 - l * Math.sin(a - 0.38));
  ctx.lineTo(x2 - l * Math.cos(a + 0.38), y2 - l * Math.sin(a + 0.38));
  ctx.closePath(); ctx.fill();
}

function pline(pts, col, lw, dash) {
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.strokeStyle = col; ctx.lineWidth = lw || 0.8;
  ctx.setLineDash(dash || []);
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke(); ctx.setLineDash([]);
}

function depth(x, y, z) { return -y * 0.8 + z * 0.1; }

function drawHalf(ax, ay, az, bx, by, bz, N, col, lw, dash, front) {
  let pts = [];
  for (let i = 0; i <= N * 2; i++) {
    const t = (i / (N * 2)) * 2 * Math.PI;
    const x = Math.cos(t)*ax + Math.sin(t)*bx;
    const y = Math.cos(t)*ay + Math.sin(t)*by;
    const z = Math.cos(t)*az + Math.sin(t)*bz;
    if ((depth(x,y,z) >= 0) === front) {
      pts.push(proj(x, y, z));
    } else {
      if (pts.length > 1) pline(pts, col, lw, dash);
      pts = [];
    }
  }
  if (pts.length > 1) pline(pts, col, lw, dash);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const th = tD * Math.PI / 180, ph = pD * Math.PI / 180;
  const bx = Math.sin(th)*Math.cos(ph), by = Math.sin(th)*Math.sin(ph), bz = Math.cos(th);

  // Sphere fill (subtle)
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.fillStyle = 'rgba(15, 18, 32, 0.6)';
  ctx.fill();

  // Sphere border
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.strokeStyle = 'rgba(100, 120, 220, 0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Back great circles
  drawHalf(1,0,0, 0,1,0, 120, fgdd, 0.8, [5,5], false);
  drawHalf(0,0,1, 1,0,0, 120, fgdd, 0.8, [5,5], false);
  drawHalf(0,0,1, 0,1,0, 120, fgdd, 0.8, [5,5], false);

  // Negative axis stubs
  const an = 0.22;
  [
    [0,0,-1.3, 0,0,-an],
    [-1.3,0,0, -an,0,0],
    [0,-1.3,0, 0,-an,0],
  ].forEach(([x1,y1,z1,x2,y2,z2]) => {
    pline([proj(x1,y1,z1), proj(x2,y2,z2)], 'rgba(74,80,128,0.5)', 0.8, [3,4]);
  });

  // Projection dashes
  pline([proj(bx,by,bz), proj(bx,by,0)], 'rgba(123,110,246,0.3)', 0.8, [3,3]);
  pline([proj(bx,by,0),  proj(0,0,0)  ], 'rgba(123,110,246,0.3)', 0.8, [3,3]);

  // Equatorial shadow dot
  const sp = proj(bx, by, 0);
  ctx.beginPath();
  ctx.fillStyle = 'rgba(123,110,246,0.35)';
  ctx.arc(sp.x, sp.y, 5, 0, 2*Math.PI); ctx.fill();

  // Theta arc
  ctx.beginPath(); ctx.strokeStyle = 'rgba(240,168,67,0.55)'; ctx.lineWidth = 1.3; ctx.setLineDash([3,3]);
  for (let i = 0; i <= 30; i++) {
    const t = (i/30)*th, p = proj(Math.sin(t)*Math.cos(ph), Math.sin(t)*Math.sin(ph), Math.cos(t));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Phi arc
  ctx.beginPath(); ctx.strokeStyle = 'rgba(45,212,176,0.55)'; ctx.lineWidth = 1.3; ctx.setLineDash([3,3]);
  for (let i = 0; i <= 30; i++) {
    const t = (i/30)*ph, p = proj(0.42*Math.cos(t), 0.42*Math.sin(t), 0);
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Front great circles
  drawHalf(1,0,0, 0,1,0, 120, 'rgba(60,70,140,0.6)', 0.9, [], true);
  drawHalf(0,0,1, 1,0,0, 120, 'rgba(60,70,140,0.6)', 0.9, [], true);
  drawHalf(0,0,1, 0,1,0, 120, 'rgba(60,70,140,0.6)', 0.9, [], true);

  // Axes
  const ax = 1.3, og = proj(0,0,0);
  const axes = [
    { to:[ax,0,0], col: blue,   lbl:'X', ox:8,  oy:0  },
    { to:[0,ax,0], col: teal,   lbl:'Y', ox:8,  oy:0  },
    { to:[0,0,ax], col: purple, lbl:'Z', ox:0,  oy:-10},
  ];
  axes.forEach(({to, col, lbl, ox, oy}) => {
    const tp = proj(...to);
    ctx.beginPath(); ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.setLineDash([]);
    ctx.moveTo(og.x, og.y); ctx.lineTo(tp.x, tp.y); ctx.stroke();
    ah(og.x, og.y, tp.x, tp.y, col);
    ctx.fillStyle = col; ctx.font = '500 13px "DM Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lbl, tp.x + ox, tp.y + oy);
  });

  // State vector glow
  const svp = proj(bx, by, bz);
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(123,110,246,0.18)';
  ctx.lineWidth = 8;
  ctx.moveTo(og.x, og.y); ctx.lineTo(svp.x, svp.y); ctx.stroke();

  // State vector
  ctx.beginPath(); ctx.strokeStyle = purple; ctx.lineWidth = 2.2;
  ctx.moveTo(og.x, og.y); ctx.lineTo(svp.x, svp.y); ctx.stroke();
  ah(og.x, og.y, svp.x, svp.y, purple);

  // State dot
  ctx.beginPath(); ctx.fillStyle = 'rgba(123,110,246,0.25)'; ctx.arc(svp.x, svp.y, 10, 0, 2*Math.PI); ctx.fill();
  ctx.beginPath(); ctx.fillStyle = purple; ctx.arc(svp.x, svp.y, 5, 0, 2*Math.PI); ctx.fill();
  ctx.beginPath(); ctx.fillStyle = '#fff'; ctx.arc(svp.x, svp.y, 2, 0, 2*Math.PI); ctx.fill();

  // Angle labels
  const tLP = proj(0.2*Math.sin(th/2)*Math.cos(ph), 0.2*Math.sin(th/2)*Math.sin(ph), 0.2*Math.cos(th/2));
  ctx.fillStyle = amber; ctx.font = 'italic 13px "DM Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('θ', tLP.x + 18, tLP.y - 6);

  const pLP = proj(0.46*Math.cos(ph/2), 0.46*Math.sin(ph/2), -0.05);
  ctx.fillStyle = teal; ctx.fillText('φ', pLP.x, pLP.y + 14);

  // Cardinal state labels
  const states = [
    { x:0,  y:0,  z:1,  lbl:'|0⟩', sub:'Z+', col:purple, ox:9,  oy:-4 },
    { x:0,  y:0,  z:-1, lbl:'|1⟩', sub:'Z−', col:purple, ox:9,  oy:4  },
    { x:1,  y:0,  z:0,  lbl:'|+⟩', sub:'X+', col:blue,   ox:9,  oy:0  },
    { x:-1, y:0,  z:0,  lbl:'|−⟩', sub:'X−', col:blue,   ox:-5, oy:0, ra:true },
    { x:0,  y:1,  z:0,  lbl:'|i⟩', sub:'Y+', col:amber,  ox:9,  oy:0  },
    { x:0,  y:-1, z:0,  lbl:'|−i⟩',sub:'Y−', col:pink,   ox:9,  oy:0  },
  ];

  states.forEach(s => {
    const p = proj(s.x, s.y, s.z);

    // Glow behind dot
    ctx.beginPath();
    ctx.fillStyle = s.col + '28';
    ctx.arc(p.x, p.y, 9, 0, 2*Math.PI); ctx.fill();

    ctx.beginPath();
    ctx.fillStyle = s.col;
    ctx.arc(p.x, p.y, 4.5, 0, 2*Math.PI); ctx.fill();

    ctx.fillStyle = s.col;
    ctx.font = '500 12px "DM Mono", monospace';
    ctx.textAlign = s.ra ? 'right' : 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.lbl, p.x + s.ox, p.y + s.oy - 5);

    ctx.fillStyle = fgd;
    ctx.font = '300 10px "DM Mono", monospace';
    ctx.fillText(s.sub, p.x + s.ox, p.y + s.oy + 7);
  });

  // Update info panel
  const p0 = Math.cos(th/2)**2, p1 = Math.sin(th/2)**2;
  const ar  = Math.cos(th/2).toFixed(3);
  const bre = (Math.sin(th/2)*Math.cos(ph)).toFixed(3);
  const bim = (Math.sin(th/2)*Math.sin(ph)).toFixed(3);
  const bs  = Math.abs(+bim) < 0.001 ? `${bre}` : `(${bre}${+bim >= 0 ? '+' : ''}${bim}i)`;

  document.getElementById('sv').textContent = `|ψ⟩ = ${ar}|0⟩ + ${bs}|1⟩`;
  document.getElementById('p0b').style.width = (p0 * 100).toFixed(1) + '%';
  document.getElementById('p1b').style.width = (p1 * 100).toFixed(1) + '%';
  document.getElementById('p0t').textContent = (p0 * 100).toFixed(1) + '%';
  document.getElementById('p1t').textContent = (p1 * 100).toFixed(1) + '%';
  document.getElementById('bv').innerHTML =
    `<span class="coord-x">x</span> = ${bx.toFixed(3)}<br>` +
    `<span class="coord-y">y</span> = ${by.toFixed(3)}<br>` +
    `<span class="coord-z">z</span> = ${bz.toFixed(3)}`;
}

function upd() {
  tD = +document.getElementById('th').value;
  pD = +document.getElementById('ph').value;
  document.getElementById('tv').textContent = tD + '°';
  document.getElementById('pv').textContent = pD + '°';
  draw();
}

function ss(t, p) {
  tD = t; pD = p;
  document.getElementById('th').value = t;
  document.getElementById('ph').value = p;
  document.getElementById('tv').textContent = t + '°';
  document.getElementById('pv').textContent = p + '°';
  draw();
}

function gate(g) {
  const th = tD*Math.PI/180, ph = pD*Math.PI/180;
  let nt = th, np = ph;
  if (g==='X') { nt = Math.PI-th; np = Math.PI-ph; }
  else if (g==='Y') { nt = Math.PI-th; np = -ph; }
  else if (g==='Z') { np = ph+Math.PI; }
  else if (g==='H') {
    const x=Math.sin(th)*Math.cos(ph), z=Math.cos(th), y=Math.sin(th)*Math.sin(ph);
    nt = Math.acos(Math.max(-1, Math.min(1, (x-z)/Math.sqrt(2))));
    np = Math.atan2(y, (x+z)/Math.sqrt(2));
  }
  else if (g==='S') { np = ph+Math.PI/2; }
  else if (g==='T') { np = ph+Math.PI/4; }
  tD = ((nt*180/Math.PI)%360+360)%360;
  if (tD > 180) tD = 360 - tD;
  pD = ((np*180/Math.PI)%360+360)%360;
  ss(Math.round(tD), Math.round(pD));
}

function setMode(m) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['manual','states','gates'][i] === m));
  document.getElementById('pm').style.display = m==='manual' ? 'block' : 'none';
  document.getElementById('ps').style.display = m==='states' ? 'block' : 'none';
  document.getElementById('pg').style.display = m==='gates'  ? 'block' : 'none';
}

draw();
</script>
</body>
</html>
